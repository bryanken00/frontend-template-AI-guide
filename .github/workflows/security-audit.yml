# Weekly Security Audit Workflow
# This workflow runs npm audit weekly to check for vulnerabilities

name: Weekly Security Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: |
          npm audit --audit-level=moderate || echo "Vulnerabilities found"
          npm audit --json > audit-results.json

      - name: Check for vulnerabilities
        working-directory: ./frontend
        run: |
          VULNERABILITIES=$(cat audit-results.json | jq '.metadata.vulnerabilities | .moderate + .high + .critical')
          echo "Found $VULNERABILITIES vulnerabilities"

          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "⚠️ Security vulnerabilities detected!"
            echo "Run 'npm audit fix' to resolve issues"
            exit 1
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: frontend/audit-results.json
          retention-days: 30

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Security Vulnerabilities Detected',
              body: `## Security Audit Failed
              
              The weekly security audit has detected vulnerabilities in npm packages.
              
              ### Action Required
              1. Review the audit results in the workflow artifacts
              2. Run \`npm audit\` locally to see details
              3. Run \`npm audit fix\` to auto-fix issues
              4. For manual fixes, update packages individually
              
              ### Commands
              \`\`\`bash
              cd frontend
              npm audit
              npm audit fix
              npm run build
              npm run lint
              \`\`\`
              
              See [PACKAGE_MAINTENANCE.md](./docs/PACKAGE_MAINTENANCE.md) for detailed instructions.
              `,
              labels: ['security', 'dependencies', 'high-priority']
            })
